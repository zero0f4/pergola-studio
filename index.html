<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Pergola Studio — zwevende pergola</title>
<style>
  /* altijd licht: de pergola is zwart, de omgeving blijft licht */
  :root {
    --bg1: #e8ecef; --bg2: #faf8f2; --ink: #22201C; --muted: #6E6A61;
    --panel: rgba(255,255,255,.88); --line: #C4C1B8; --steel:#8A6F4D; --warn:#B3402E;
  }
  html, body { margin:0; height:100%; overflow:hidden; background: linear-gradient(var(--bg1), var(--bg2)); font-family: "Avenir Next","Avenir","Segoe UI",system-ui,sans-serif; color: var(--ink); }
  canvas { display:block; width:100vw; height:100vh; touch-action:none; cursor:grab; }
  canvas.dragging { cursor:grabbing; }

  .hud { position:fixed; top:0; right:0; padding:10px 12px; display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; max-width:calc(100vw - 320px); }
  button {
    background:var(--panel); border:1px solid var(--line); border-radius:7px; color:var(--ink);
    font:inherit; font-size:.68rem; padding:.28rem .55rem; cursor:pointer; backdrop-filter: blur(6px);
  }
  button.active { outline:2px solid var(--steel); }

  aside {
    position:fixed; top:10px; left:10px; bottom:10px; width:272px; overflow-y:auto;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:10px 14px 12px; backdrop-filter: blur(8px);
  }
  aside h1 { font-size:.9rem; margin:0; }
  aside .sub { font-family:ui-monospace,Menlo,monospace; font-size:.6rem; letter-spacing:.06em; color:var(--muted); margin-bottom:4px; }
  aside h2 { font-family:ui-monospace,Menlo,monospace; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--steel); margin:8px 0 3px; border-top:1px solid var(--line); padding-top:6px; }
  .ctl { margin:2px 0; }
  .ctl label { display:flex; justify-content:space-between; font-size:.7rem; margin-bottom:0; }
  .ctl label b { font-family:ui-monospace,Menlo,monospace; font-weight:600; }
  input[type=range] { width:100%; accent-color:#3A3835; height:16px; margin:0; }
  .chks { display:grid; grid-template-columns:1fr 1fr; gap:0 8px; }
  .chk label { display:flex; gap:5px; align-items:center; font-size:.66rem; margin:2px 0; cursor:pointer; line-height:1.25; }
  input[type=checkbox], input[type=radio] { accent-color:#3A3835; width:13px; height:13px; flex:none; }
  #uit { font-size:.7rem; line-height:1.4; }
  #uit table { width:100%; border-collapse:collapse; font-family:ui-monospace,Menlo,monospace; font-size:.64rem; }
  #uit td { padding:.08rem 0; }
  #uit td:last-child { text-align:right; font-weight:600; }
  .warn { color:var(--warn); font-size:.66rem; margin-top:4px; font-weight:600; }
  .ok { color:#3F7A45; font-size:.66rem; margin-top:4px; font-weight:600; }
  .hint {
    position:fixed; bottom:10px; left:0; right:0; text-align:center; pointer-events:none;
    font-family:ui-monospace,Menlo,monospace; font-size:.66rem; letter-spacing:.08em; color:var(--muted);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<aside>
  <h1>Pergola Studio</h1>
  <div class="sub">zwevend · zwart douglas · wip-principe</div>

  <h2>Maten (cm)</h2>
  <div class="ctl"><label>breedte achter <b id="vB">365</b></label><input type="range" id="sB" min="300" max="450" step="5" value="365"></div>
  <div class="ctl"><label>breedte voor <b id="vB2">365</b></label><input type="range" id="sB2" min="300" max="520" step="5" value="365"></div>
  <div class="ctl"><label>verbreding vanaf achter <b id="vzs">200</b></label><input type="range" id="szs" min="100" max="300" step="10" value="200"></div>
  <div class="ctl"><label>diepte dak <b id="vD">320</b></label><input type="range" id="sD" min="250" max="500" step="5" value="320"></div>
  <div class="ctl"><label>duo-afstand (h.o.h.) <b id="vduo">90</b></label><input type="range" id="sduo" min="60" max="150" step="5" value="90"></div>
  <div class="ctl"><label>oversteek achter <b id="vover">30</b></label><input type="range" id="sover" min="20" max="60" step="5" value="30"></div>
  <div class="ctl"><label>paalhoogte (kop) <b id="vH">260</b></label><input type="range" id="sH" min="230" max="290" step="5" value="260"></div>
  <div class="ctl"><label>dakhout h.o.h. <b id="vlam">35</b></label><input type="range" id="slam" min="25" max="80" step="1" value="35"></div>
  <div class="ctl"><label>voorhoekpaal terug <b id="vterug">35</b></label><input type="range" id="sterug" min="0" max="80" step="5" value="35"></div>
  <div class="ctl"><label>kleine schoor (maat) <b id="vA">90</b></label><input type="range" id="sA" min="60" max="120" step="5" value="90"></div>
  <div class="ctl"><label>dwarsbalk hoogte <b id="vdz">100</b></label><input type="range" id="sdz" min="30" max="230" step="5" value="100"></div>

  <h2>Onderdelen</h2>
  <div class="chks">
  <div class="chk"><label><input type="checkbox" id="cSZ" checked> schoor zweef-zijde</label></div>
  <div class="chk"><label><input type="checkbox" id="cSP" checked> schoor paal-zijde</label></div>
  <div class="chk"><label><input type="checkbox" id="cPanZ" checked> paneel zweef-zijde</label></div>
  <div class="chk"><label><input type="checkbox" id="cPanP" checked> paneel paal-zijde</label></div>
  <div class="chk"><label><input type="checkbox" id="cWand"> achterwand latten</label></div>
  <div class="chk"><label><input type="checkbox" id="cRol"> achterwand rolgordijn</label></div>
  <div class="chk"><label><input type="checkbox" id="cHoek" checked> voorhoekpaal</label></div>
  <div class="chk"><label><input type="checkbox" id="cDoek" checked> schaduwdoek</label></div>
  <div class="chk"><label><input type="checkbox" id="cBalk"> dak 15×15 balken</label></div>
  <div class="chk"><label><input type="checkbox" id="cMas"> liggers massief 15×15</label></div>
  <div class="chk"><label><input type="checkbox" id="cTui"> tuikabels (hoge achterpalen +100)</label></div>
  <div class="chk"><label><input type="checkbox" id="cDwars"> dwarsbalk tussen de achterpalen (hoogte schuifbaar)</label></div>
  </div>

  <h2>Fundering — drukpalen</h2>
  <div class="chk"><label><input type="radio" name="fd" value="basic" checked> prefab poer 30×30 (budget, € 25)</label></div>
  <div class="chk"><label><input type="radio" name="fd" value="antraciet"> gadero antraciet 14×14 met 28×28-voet (€ 66)</label></div>
  <div class="chk"><label><input type="radio" name="fd" value="blok"> gestorte sleufblokken (zwaarst, mortelbeton)</label></div>

  <h2>Fundering — trekanker achterpaal</h2>
  <div class="chk"><label><input type="radio" name="ft" value="tegel" checked> tegelanker: 2 tegels + draadeind (0 beton)</label></div>
  <div class="chk"><label><input type="radio" name="ft" value="gestort"> gestorte trekpoer (±21 zakken)</label></div>
  <div class="chk"><label><input type="radio" name="ft" value="b2"> prefab + dwarsstangen + 4 zakken</label></div>

  <h2>Belasting</h2>
  <div class="ctl"><label>dakbelasting <b id="vbel">25 kg/m²</b></label><input type="range" id="sbel" min="0" max="60" step="5" value="25"></div>
  <div class="sub" style="margin-top:0">0 droog · 25 wind op doek · 50 storm+sneeuw</div>

  <h2>Uitkomsten</h2>
  <div id="uit"></div>
  <div id="melding"></div>
  <button id="bSave" style="width:100%;margin-top:8px;font-weight:700;padding:.45rem;font-size:.74rem">🗎 Bouwtekening (print / PDF)</button>
</aside>

<div class="hud">
  <button id="bAuto" class="active">⟲ draaien</button>
  <button data-view="hoek">hoek</button>
  <button data-view="voor">voor</button>
  <button data-view="zij">zweef-zijde</button>
  <button data-view="jaloezie">paal-zijde</button>
  <button data-view="achter">achter</button>
  <button data-view="boven">boven</button>
  <button id="bDoek">doek dicht</button>
  <button id="bKracht" class="active">krachten</button>
  <button id="bMaat" class="active">maten</button>
</div>
<div class="hint">slepen = draaien · scrollen / knijpen = zoomen · dubbelklik = reset</div>

<script>
'use strict';
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

/* ---------- parameters ---------- */
const P = { B:365, B2:365, zs:200, D:320, duo:90, over:30, H:260, lam:35, terug:35, A:90, dz:100, bel:25 };
// lamel-lengte op diepte z (vanaf achter): tot P.zs de achterbreedte, daarna lineair uitwaaierend naar P.B2
function lamLen(cz){ const zs=Math.min(P.zs,P.D-10); return cz<=zs? P.B : P.B + (P.B2-P.B)*(cz-zs)/(P.D-zs); }
const opt = { schoorZ:true, schoorP:true, panZ:true, panP:true, wandLat:false, wandRol:false, hoekpaal:true, doek:true, massief:false, balk:false, poeren:true, tui:false, dwars:false, fundDruk:'basic', fundTrek:'tegel' };
let doekDicht=false, showK=true, showM=true;

/* ---------- model-opbouw (alle maten in cm) ----------
   x = breedte · y = hoogte (0 = maaiveld) · z = diepte (0 = achter) */
const parts = [];
function hex(c){ return [parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)]; }
const WOOD=hex('#211f1d'), WOOD2=hex('#2a2724'), LAT=hex('#1b1a18'), BETON=hex('#9a948a'), DOEK=hex('#4a4744');

function addBox(x1,y1,z1,x2,y2,z2,col){
  const v=[[x1,y1,z1],[x2,y1,z1],[x2,y2,z1],[x1,y2,z1],[x1,y1,z2],[x2,y1,z2],[x2,y2,z2],[x1,y2,z2]];
  parts.push({v, quads:[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[3,2,6,7],[4,5,1,0]], col});
}
function addKarbeel(X, zF, A, H){
  const y0=H-20-A;
  const p=[[y0-10.6,zF],[y0+10.6,zF],[H-20,zF+A-10.6],[H-20,zF+A+10.6]];
  const v=[];
  for(const dx of [-7.5,7.5]) for(const [y,z] of p) v.push([X+dx,y,z]);
  parts.push({v, quads:[[0,1,2,3],[7,6,5,4],[0,4,5,1],[1,5,6,2],[2,6,7,3],[3,7,4,0]], col:WOOD});
}

function fysica(){
  const B=P.B/100, D=P.D/100, duo=P.duo/100, over=P.over/100, A=P.A/100;
  const zweefCm = P.D - P.duo - P.over;
  const a = zweefCm/100, c = duo+over;
  const nLam = Math.max(2, Math.round((P.D-(opt.balk?15:5))/P.lam)+1);
  // gemiddelde dakbreedte (uitwaaierend deel meegewogen)
  const zsM=Math.min(P.zs,P.D-10)/100, B2=P.B2/100;
  const Bavg = (B*zsM + (B+B2)/2*(D-zsM))/D;
  // eigen gewicht (douglas 550 kg/m³)
  const wLam = nLam*Bavg*(opt.balk?12.4:1.73), wLig = (opt.massief?2*12.4:4*5.5)*D, wBalk = (B-0.6)*5.5 + (B2-0.6)*5.5, wSch = 31;
  const wDak = wLam+wLig+wBalk+wSch;
  const wPalen = 5*(P.H/100)*12.4;
  const w = wDak/2/D;                        // eigen dak per zijde per m
  // tributary zweef-zijde: de verbreding hangt volledig aan de zweef-ligger
  let Tz=0; for(let i=0;i<8;i++){ const zi=(i+0.5)*P.D/8, Li=lamLen(zi)/100, ei=Li-B;
    Tz += Li*Math.min(0.9, Math.max(0.5, (B-0.3-(Li/2-ei))/(B-0.6))); }
  Tz/=8;
  const q = (wDak/D)*(Tz/Bavg) + P.bel*Tz;   // kg/m op de zweef-ligger
  // tuikabels: kabel van verhoogde achterpaal (+100) naar de ligger-kop tilt de voorrand
  const Rtui = opt.tui? 0.4*q*a : 0;
  const hyp = Math.hypot(100, P.D-P.over);
  const kabelT = opt.tui? Math.round(Rtui*hyp/100/5)*5 : 0;
  const M = Math.max(0, q*(a*a - c*c)/2 - Rtui*a);   // kg·m om de voorpaal (kabel ontlast)
  const trek = Math.round(M/duo/5)*5;
  const druk = Math.round((q*D + M/duo + 35 + Rtui)/5)*5;
  // rekenwaarde-trek (altijd bij 50 kg/m², onafhankelijk van de schuif) — hierop wordt de fundering gedimensioneerd
  const q50 = (wDak/D)*(Tz/Bavg) + 50*Tz;
  const R50 = opt.tui? 0.4*q50*a : 0;
  const trekR = Math.round(Math.max(0, q50*(a*a - c*c)/2 - R50*a)/duo/5)*5;
  const kabelT50 = opt.tui? Math.round(R50*hyp/100/5)*5 : 0;
  // blok-advies (3× veiligheid op de rekenwaarde, doorsnede 50×70)
  const nodig = Math.max(400, 3*trekR);
  const blokL = Math.max(P.duo+50, Math.ceil(nodig/2400/0.35*100/10)*10);
  const blokKg = Math.round(blokL/100*0.35*2400/10)*10;
  // doorbuiging voorbij de schoor (sandwich 2× 5×20 óf massief 15×15, E=10 GPa)
  const EI = opt.massief? 4.22e5 : 6.67e5;      // N·m²
  const Wm = opt.massief? 5.63e5 : 6.7e5;       // mm³
  const f = opt.tui? Math.max(0.15, a*0.5) : Math.max(0.15, a - (opt.schoorZ? A:0));
  const dbg = (q*9.81)*Math.pow(f,4)/(8*EI)*1000;
  // ligger-spanning bij de schoorkop
  const sigma = (q*9.81*f*f/2*1000)/Wm;
  // losse trekpoer (3× de rekenwaarde-trek, diepte 70, vierkant) — fallback bij hoge trek
  const poerZ = Math.max(50, Math.ceil(Math.sqrt(nodig/2400/0.7)*100/10)*10);
  const poerKg = Math.round((poerZ/100)*(poerZ/100)*0.7*2400/10)*10;
  // trekanker-capaciteit per gekozen optie
  const ankerKg = Math.round((0.36*0.65*1700 + 45)/5)*5;                     // tegelanker: grondkolom + tegels
  const capLbl = opt.fundTrek==='tegel'? 'tegelanker 2× 60×60' : opt.fundTrek==='b2'? 'prefab + kraag (B2)' : 'gestorte trekpoer';
  // opleggingen paal-zijde (3 steunpunten: achterpaal · voorpaal · voorhoekpaal)
  const L2=Math.max(0.3,(P.D-P.terug-P.over-P.duo)/100), oF=P.terug/100;
  const pA=Math.max(0, Math.round(q*(over + 0.4*duo)/5)*5);
  const pH=Math.round(q*(oF + 0.4*L2)/5)*5;
  const pV=Math.max(0, Math.round((q*D - pA - pH + 20)/5)*5);
  const capTrek = opt.fundTrek==='tegel'? ankerKg : opt.fundTrek==='b2'? 380 : poerKg;
  return { zweefCm, nLam, wDak:Math.round(wDak/5)*5, wHout:Math.round((wDak+wPalen+12)/5)*5,
           trek, trekR, druk, pA, pV, pH, blokL, blokKg, veilig:(blokKg/Math.max(trekR,1)), poerZ, poerKg, ankerKg, capTrek, capLbl, kabelT, kabelT50, dbg, sigma };
}

function buildModel(){
  parts.length=0;
  const {B,D,duo,over,H,terug}=P, A=P.A;
  const xZ=30, xP=B-30;                       // zweef-zijde x=30 · paal-zijde x=B-30
  const zA=over, zV=over+duo, zH=D-terug;
  const fx=fysica();
  // beton (koppen 5 cm boven maaiveld)
  if(opt.poeren){
    for(const [qx2,qz2] of [[xZ,zA],[xZ,zV],[xP,zA],[xP,zV]]) addBox(qx2-15,-1,qz2-15, qx2+15,5,qz2+15, BETON);
    if(opt.hoekpaal) addBox(xP-15,-1,zH-15, xP+15,5,zH+15, BETON);
  } else {
    const bl=fx.blokL, b0=Math.max(0, zV+20-bl);
    addBox(xZ-30,-1,b0, xZ+30,5,zV+20, BETON);
    addBox(xP-25,-1,Math.max(0,zV+15-Math.max(120,duo+40)), xP+25,5,zV+15, BETON);
    if(opt.hoekpaal) addBox(xP-20,-1,zH-20, xP+20,5,zH+20, BETON);
  }
  // palen (bij massieve liggers eindigt de paal ónder de ligger; achterpalen bij tui +100)
  const topP = opt.massief? H-20 : H;
  const posts=[[xZ,zA],[xZ,zV],[xP,zA],[xP,zV]];
  if(opt.hoekpaal) posts.push([xP,zH]);
  for(const [px,pz] of posts){
    const top = (opt.tui && pz===zA)? H+100 : topP;
    addBox(px-7.5,0,pz-7.5, px+7.5,top,pz+7.5, WOOD);
  }
  // tuikabels van de verhoogde achterpaal-toppen naar de ligger-koppen
  if(opt.tui){
    addPrismKabel(xZ); addPrismKabel(xP);
    function addPrismKabel(X){
      const aPt=[X,H+96,zA], bPt=[X,H-6,D-4];
      const t=[0,(bPt[1]-aPt[1]),(bPt[2]-aPt[2])], L=Math.hypot(t[1],t[2]);
      const u=[1,0,0], v2=[0,t[2]/L,-t[1]/L], hw=1.2;
      const v=[];
      for(const p of [aPt,bPt]) for(const [su,sv] of [[-1,-1],[1,-1],[1,1],[-1,1]])
        v.push([p[0]+u[0]*hw*su+v2[0]*hw*sv, p[1]+u[1]*hw*su+v2[1]*hw*sv, p[2]+u[2]*hw*su+v2[2]*hw*sv]);
      parts.push({v, quads:[[0,1,2,3],[7,6,5,4],[0,4,5,1],[1,5,6,2],[2,6,7,3],[3,7,4,0]], col:[110,108,102]});
    }
  }
  // liggers: sandwich 2× 5×20 óf massief 15×15
  if(opt.massief){ for(const bx of [xZ-7.5,xP-7.5]) addBox(bx,H-20,0, bx+15,H,D, WOOD); }
  else { for(const bx of [xZ-12.5,xZ+7.5,xP-12.5,xP+7.5]) addBox(bx,H-20,0, bx+5,H,D, WOOD); }
  // koppelbalk (achterrand) en voorbalk (voorrand) — doorlopend over de volle dakbreedte
  const eF=P.B2-P.B;
  addBox(0,H-20,-5, B,H,0, WOOD);
  addBox(-eF,H-20,D, B,H,D+5, WOOD);
  // dwarsbalk tussen de achterpalen, hoogte schuifbaar (leuning / plank / rolgordijn-rail)
  if(opt.dwars){ const dzc=Math.min(Math.max(P.dz,20),H-30); addBox(xZ+7.5,dzc-7.5,zA-2.5, xP-7.5,dzc+7.5,zA+2.5, WOOD); }
  // kleine schoren per zijde (vinkjes)
  if(opt.schoorZ) addKarbeel(xZ, zV+7.5, A, H);
  if(opt.schoorP) addKarbeel(xP, zV+7.5, A, H);
  // dakhout: lamellen 4,5×7 op hun kant óf balken 15×15 — lengte waaiert uit naar voren
  const dh = opt.balk? 7.5 : 2.25, dhH = opt.balk? 15 : 7;
  const n=fx.nLam, s=(D-2*dh)/(n-1);
  for(let i=0;i<n;i++){ const cz=dh+i*s, L=lamLen(cz), e=L-B; addBox(-e,H,cz-dh, B,H+dhH,cz+dh, WOOD2); }   // verbreding volledig aan de zweef-zijde
  // jaloezie-panelen in de duo-vakken (per zijde) + achterwand (latten of rolgordijn)
  for(let y=30; y+7<=H-22; y+=10){
    if(opt.panZ) addBox(xZ-1.1,y,zA+7.5, xZ+1.1,y+7,zV-7.5, LAT);
    if(opt.panP) addBox(xP-1.1,y,zA+7.5, xP+1.1,y+7,zV-7.5, LAT);
    if(opt.wandLat) addBox(xZ+7.5,y,zA-1.1, xP-7.5,y+7,zA+1.1, LAT);
  }
  if(opt.wandRol){
    addBox(xZ+7.5,H-30,zA-11.5, xP-7.5,H-21,zA-3.5, WOOD);            // cassette/buis onder de koppelbalk
    addBox(xZ+12,95,zA-8, xP-12,H-30,zA-6.5, DOEK);                   // doek half afgerold
    addBox(xZ+12,92,zA-9, xP-12,95,zA-5.5, WOOD);                     // onderlat
  }
  // doek (vinkje + open/dicht-knop)
  if(!opt.doek){ /* geen doek */ }
  else if(doekDicht){
    const n2=8, sp=(D-over-20)/n2;
    for(let i=0;i<n2;i++){ const z1=zA+5+i*sp; addBox(48,H-29-(i%2)*4,z1, B-48,H-24-(i%2)*4,z1+sp, DOEK); }
  } else {
    addBox(48,H-34,zA-5, B-48,H-22,zV-10, DOEK);
  }
}

/* ---------- renderer ---------- */
const LIGHT=[0.45,0.85,0.35];
let yaw=3.78, pitch=0.34, dist=1000, auto=true, W,H2,DPR;
const nrm=a=>{const l=Math.hypot(a[0],a[1],a[2])||1; return [a[0]/l,a[1]/l,a[2]/l];};
const LN=nrm(LIGHT);
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
const crs=(a,b)=>[a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];

function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H2=innerHeight; cv.width=W*DPR; cv.height=H2*DPR; }
addEventListener('resize',()=>{resize(); draw();});
resize();

function draw(){
  const CTR=[P.B/2, P.H/2-15, P.D/2];
  const CX = W/2 + 120;                       // model rechts van het paneel
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H2);
  const cy=Math.cos(yaw), sy=Math.sin(yaw), cp=Math.cos(pitch), sp=Math.sin(pitch), F=900;
  const Pr=(x,y,z)=>{
    let X=x-CTR[0], Y=y-CTR[1], Z=z-CTR[2];
    let x1=X*cy - Z*sy, z1=X*sy + Z*cy;
    let y2=Y*cp - z1*sp, z2=Y*sp + z1*cp + dist;
    if(z2<80) return null;
    const s=F/z2; return [x1*s + CX, -y2*s + H2*0.55, z2];
  };
  // grond + schaduw
  const g=[Pr(-320,0,-260),Pr(P.B+320,0,-260),Pr(P.B+320,0,P.D+320),Pr(-320,0,P.D+320)];
  if(g.every(Boolean)){ ctx.fillStyle='rgba(125,120,105,.18)'; poly(g); }
  const s2=[Pr(4,0,4),Pr(P.B-4,0,4),Pr(P.B-4,0,P.D+20),Pr(4,0,P.D+20)];
  if(s2.every(Boolean)){ ctx.fillStyle='rgba(0,0,0,.12)'; poly(s2); }
  // vlakken
  const faces=[];
  for(const p of parts){
    const tv=p.v.map(pt=>Pr(pt[0],pt[1],pt[2]));
    if(tv.some(t=>!t)) continue;
    for(const q of p.quads){
      const A2=p.v[q[0]], B2=p.v[q[1]], C2=p.v[q[2]];
      const n=nrm(crs(sub(B2,A2), sub(C2,A2)));
      const sh=0.62 + 0.48*Math.max(0, n[0]*LN[0]+n[1]*LN[1]+n[2]*LN[2]);
      faces.push({pts:q.map(i=>tv[i]), z:(tv[q[0]][2]+tv[q[1]][2]+tv[q[2]][2]+tv[q[3]][2])/4, col:p.col, sh});
    }
  }
  faces.sort((a,b)=>b.z-a.z);
  for(const f of faces){
    const [r,g2,b]=f.col;
    ctx.fillStyle=`rgb(${r*f.sh|0},${g2*f.sh|0},${b*f.sh|0})`;
    poly(f.pts);
    ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=.5; ctx.stroke();
  }
  // krachtpijlen: zweef-duo (druk + trek) én de opleggingen van de paal-zijde
  if(showK){
    const fx=fysica(), zA=P.over, zV=P.over+P.duo, xR=P.B-6;
    arrow(Pr(6,P.H+38,zV), Pr(6,P.H-52,zV), '#B3402E', `druk ±${fx.druk} kg`, -8);
    arrow(Pr(6,P.H-130,zA), Pr(6,P.H-30,zA), '#B3402E', `trek ±${fx.trek} kg`, -8);
    if(opt.hoekpaal){
      arrow(Pr(xR,P.H+34,zA), Pr(xR,P.H-38,zA), '#B3402E', `±${fx.pA} kg`, 8);
      arrow(Pr(xR,P.H+34,zV), Pr(xR,P.H-38,zV), '#B3402E', `±${fx.pV} kg`, 8);
      arrow(Pr(xR,P.H+34,P.D-P.terug), Pr(xR,P.H-38,P.D-P.terug), '#B3402E', `±${fx.pH} kg`, 8);
    } else {
      arrow(Pr(xR,P.H+38,zV), Pr(xR,P.H-52,zV), '#B3402E', `druk ±${fx.druk} kg`, 8);
      arrow(Pr(xR,P.H-130,zA), Pr(xR,P.H-30,zA), '#B3402E', `trek ±${fx.trek} kg`, 8);
    }
  }
  // maatlijnen
  if(showM){
    const zV=P.over+P.duo, zw=P.D-zV, eF=Math.max(0,P.B2-P.B), xr=P.B+40;
    dim(Pr(-(P.B2-P.B),2,P.D+35), Pr(P.B,2,P.D+35), `${P.B2}${P.B2!==P.B?' voor':''}`);
    if(P.B2!==P.B) dim(Pr(0,2,-28), Pr(P.B,2,-28), `${P.B} achter`);
    dim(Pr(xr,2,0), Pr(xr,2,P.D), `${P.D}`);
    dim(Pr(-40-eF,2,zV), Pr(-40-eF,2,P.D), `${zw} zweef`);
    dim(Pr(-40-eF,2,P.over), Pr(-40-eF,2,zV), `${P.duo}`);
    dim(Pr(-40-eF,2,0), Pr(-40-eF,2,P.over), `${P.over}`);
    dim(Pr(-75-eF,2,P.over), Pr(-75-eF,2,P.D), `${P.D-P.over} v.a. achterpaal`);
    dim(Pr(xr,0,P.D+35), Pr(xr,P.H+7,P.D+35), `±${P.H+7} hoog`);
  }
}
function poly(pts){ ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]); for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]); ctx.closePath(); ctx.fill(); }
function dim(a,b,txt){
  if(!a||!b) return;
  const c='#6E6A61';
  ctx.strokeStyle=c; ctx.fillStyle=c; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke();
  for(const p of [a,b]){ ctx.beginPath(); ctx.arc(p[0],p[1],3,0,7); ctx.fill(); }
  ctx.font='600 11px ui-monospace,Menlo,monospace';
  ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=3;
  const mx=(a[0]+b[0])/2+6, my=(a[1]+b[1])/2-5;
  ctx.strokeText(txt,mx,my); ctx.fillText(txt,mx,my);
}
function arrow(a,b,col,txt,dx){
  if(!a||!b) return;
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke();
  const ang=Math.atan2(b[1]-a[1], b[0]-a[0]);
  ctx.beginPath(); ctx.moveTo(b[0],b[1]);
  ctx.lineTo(b[0]-11*Math.cos(ang-0.42), b[1]-11*Math.sin(ang-0.42));
  ctx.lineTo(b[0]-11*Math.cos(ang+0.42), b[1]-11*Math.sin(ang+0.42));
  ctx.closePath(); ctx.fill();
  ctx.font='600 12px ui-monospace,Menlo,monospace';
  ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=3;
  const mx=(a[0]+b[0])/2+(dx||8), my=(a[1]+b[1])/2;
  ctx.strokeText(txt,mx,my); ctx.fillText(txt,mx,my);
}

    ['trek achterpaal', '±'+fx.trek+' kg'],
    ['druk voorpaal', '±'+fx.druk+' kg'],
    ...(opt.poeren? (opt.tui? [
      ['trekanker', 'niet nodig — kabels dragen'],
      ['alle palen', opt.fundDruk==='antraciet'?'gadero antraciet 14×14':'prefab poer 30×30'],
    ] : [
      ['trekanker', fx.capLbl+' ≈ '+fx.capTrek+' kg'],
      ['veiligheid trekanker', (fx.capTrek/Math.max(fx.trekR,1)).toFixed(1)+'×'],
      ['drukpalen', opt.fundDruk==='antraciet'?'gadero antraciet 14×14':'prefab poer 30×30'],
    ]) : [
      ['blok zweef-zijde', fx.blokL+'×50×70 ≈ '+fx.blokKg+' kg'],
      ['veiligheid blok', fx.veilig>=99?'—':fx.veilig.toFixed(1)+'×'],
    ]),
    ['richtprijs materiaal', '±€ '+kosten(fx).tot],
    ...(opt.tui? [['tuikabel per zijde', '±'+fx.kabelT50+' kg → RVS ø5 + spanschroef']] : []),
    ['doorbuiging rand', fx.dbg<1?'<1 mm':'±'+fx.dbg.toFixed(0)+' mm'],
  ];
  document.getElementById('uit').innerHTML = '<table>'+rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')+'</table>';
  const m=[];
  if(fx.zweefCm<50) m.push('⚠ vrijwel geen zweef meer — vergroot de diepte of verklein duo/oversteek');
  if(fx.trek>550) m.push('⚠ trek > 550 kg: buiten dit bout-recept — duo vergroten of diepte terug');
  if(fx.sigma>8) m.push('⚠ ligger te zwaar belast — sandwich naar 6,5 × 20 of schoor aanvinken/vergroten');
  if(!opt.schoorZ && !opt.tui && fx.zweefCm>230) m.push('⚠ zonder schoor is >230 zweef niet aan te raden — schoor zweef-zijde aanvinken, tuikabels aanzetten of diepte terug');
  if(opt.tui) m.push('ℹ tuikabels: RVS ø5 met spanschroef, licht vóórspannen en jaarlijks naspannen; schoren en trekanker kunnen vervallen (achterpaal komt op druk)');
  if(!opt.hoekpaal && !opt.schoorP && fx.zweefCm>230) m.push('⚠ zonder voorhoekpaal zweeft ook de paal-zijde: boven 230 zweef daar een schoor aanvinken');
  if(!opt.hoekpaal) m.push('ℹ zonder voorhoekpaal zweven béide zijden: voer óók onder de tweede achterpaal een trekanker uit (trek geldt aan twee kanten); schoren zijn pas nodig boven 230 zweef');
  if(opt.poeren && fx.capTrek/Math.max(fx.trekR,1) < 2) m.push('⚠ trekanker te licht ('+(fx.capTrek/Math.max(fx.trekR,1)).toFixed(1)+'×) — kies de gestorte trekpoer of breng de diepte terug');
  if(opt.poeren && opt.fundTrek==='b2') m.push('ℹ B2: draadeind moet dóór de poer (plaat + moer onder), niet op slappe grond');
  if(opt.balk && P.lam<50) m.push('⚠ 15×15-balken h.o.h. < 50 wordt erg zwaar en donker — 60 à 70 is gangbaar');
  if(!opt.balk && P.lam>50) m.push('⚠ lamellen h.o.h. > 50 oogt schraal — of kies 15×15-balken');
  const ovV=(P.B2-P.B)+30;
  if(!opt.balk && ovV>90 && ovV<=150) m.push('⚠ lamel-overstek zweef-zijde '+Math.round(ovV)+' cm (> 90) — lamellen 4,5×9,5 nemen');
  if(!opt.balk && ovV>150) m.push('⚠ lamel-overstek zweef-zijde '+Math.round(ovV)+' cm: te veel — breedte-voor terug of langsdrager toevoegen');
  if(opt.balk && ovV>120) m.push('⚠ overstek dakbalken '+Math.round(ovV)+' cm — breedte-voor terug');
  if(opt.massief) m.push('ℹ massieve liggers: verbinding wordt pen-gat op de paalkoppen + ingelijmd draadeind M16 op de trek-achterpaal (zie bouwbeschrijving)');
  if(opt.wandRol) m.push('ℹ rolgordijn: aan de koppelbalk hangen, bij storm en afwezigheid altijd oprollen (het is een zeil)');
  if(opt.wandLat && opt.wandRol) m.push('⚠ kies latten óf rolgordijn voor de achterwand — beide tegelijk heeft geen zin');
  if(P.B-60>320) m.push('⚠ lamel-overspanning > 320: lamellen 4,5 × 9,5 nemen');
  if(fx.dbg>12) m.push('⚠ doorbuiging fors — schoor vergroten of diepte terug');
  document.getElementById('melding').innerHTML = m.length? m.map(x=>`<div class="${x.startsWith('ℹ')?'ok':'warn'}">${x}</div>`).join('') : '<div class="ok">✓ alles binnen het recept van de bouwbeschrijving</div>';
}

function bindSlider(id, key, label, suffix){
  const el=document.getElementById(id);
  P[key]=+el.value; document.getElementById(label).textContent=el.value+(suffix||'');   // sync met evt. door de browser herstelde stand
  el.oninput=()=>{ P[key]=+el.value; document.getElementById(label).textContent=el.value+(suffix||''); buildModel(); updUI(); draw(); };
}

function bindRadio(name,key){
  for(const el of document.querySelectorAll(`input[name=${name}]`)){
    if(el.checked) opt[key]=el.value;
    el.onchange=()=>{ opt[key]=el.value; opt.poeren = opt.fundDruk!=='blok'; buildModel(); updUI(); draw(); };
  }
  opt.poeren = opt.fundDruk!=='blok';
}

let dragging=false, lx=0, ly=0, pinch=0;
cv.addEventListener('pointerdown',e=>{dragging=true; auto=false; bAuto.classList.remove('active'); lx=e.clientX; ly=e.clientY; cv.classList.add('dragging'); cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{
  if(!dragging) return;
  yaw += (e.clientX-lx)*0.008;
  pitch = Math.max(-0.15, Math.min(1.45, pitch + (e.clientY-ly)*0.006));
  lx=e.clientX; ly=e.clientY; draw();
});
cv.addEventListener('pointerup',()=>{dragging=false; cv.classList.remove('dragging');});
cv.addEventListener('wheel',e=>{e.preventDefault(); dist=Math.max(450,Math.min(2600,dist*(1+e.deltaY*0.0012))); draw();},{passive:false});
cv.addEventListener('dblclick',()=>{yaw=3.78; pitch=0.34; dist=1000; draw();});
cv.addEventListener('touchstart',e=>{ if(e.touches.length===2) pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); },{passive:true});
cv.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if(pinch){ dist=Math.max(450,Math.min(2600,dist*pinch/d)); draw(); }
    pinch=d;
  }
},{passive:true});

      add('H-anker zwaar 15×15 (trekanker, dwarsstaaf)', 1,'st',28,'5','gadero.nl');
      add('snelbeton trekpoer (25 kg)', Math.ceil((fx.poerZ/100)*(fx.poerZ/100)*0.7/0.0125),'zak',8.75,'7','hornbach.nl');
    } else {

      add('draadeind M16 doorlopend + platen', 1,'set',15,'9','wovar.nl');

  } else {

  if(opt.doek){

  add('slotbouten M12 × 160 vz (paalvoeten)', 2*nP+1,'st',0.90,'9','wovar.nl');

  if(nPan||opt.wandLat) add('RVS schroeven 4,5 × 45 (doos 200 — panelen/wand)', 1,'doos',12,'9','wovar.nl');

  add('zwarte beits/olie voor zaagkanten (0,75 l)', 1,'pot',25,'7','hornbach.nl');
  const tot=r.reduce((a,x)=>a+x.tot,0);
  return {r, tot: Math.round(tot/5)*5};
}
